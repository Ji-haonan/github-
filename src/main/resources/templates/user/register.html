<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2 class="auth-title">注册 MyBlog</h2>

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
            <span th:text="${errorMessage}">错误信息</span>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" name="username" id="username" class="form-control"
                       placeholder="请输入用户名" th:value="${username}" required autofocus />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" name="email" id="email" class="form-control"
                       placeholder="请输入邮箱地址" th:value="${email}" required />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="请输入密码（至少6位）" required minlength="6" />
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">确认密码</label>
                <input type="password" name="confirmPassword" id="confirmPassword" class="form-control"
                       placeholder="请再次输入密码" required minlength="6" />
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">注册</button>
            </div>
        </form>

        <div class="auth-footer">
            已有账号？<a th:href="@{/login}">立即登录</a>
        </div>
    </div>
</body>
</html>
