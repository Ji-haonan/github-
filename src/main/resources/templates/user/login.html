<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <h2 class="auth-title">登录 MyBlog</h2>

        <!-- Error Message -->
        <div th:if="${param.error}" class="alert alert-danger" role="alert">
            <span th:if="${param.error[0] == 'true'}">用户名或密码错误，请重试。</span>
            <span th:unless="${param.error[0] == 'true'}" th:text="${param.error[0]}">登录错误</span>
        </div>

        <!-- Logout Message -->
        <div th:if="${param.logout}" class="alert alert-info" role="alert">
            您已成功退出登录。
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" name="username" id="username" class="form-control"
                       placeholder="请输入用户名" required autofocus />
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">密码</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="请输入密码" required />
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">登录</button>
            </div>
        </form>

        <div class="auth-footer">
            还没有账号？<a th:href="@{/register}">立即注册</a>
        </div>
    </div>
</body>
</html>
