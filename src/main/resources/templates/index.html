<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'MyBlog - 首页'">MyBlog - 首页</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">MyBlog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">分类</a>
                        <ul class="dropdown-menu">
                            <li th:each="cat : ${categories}">
                                <a class="dropdown-item" th:href="@{/category/{id}(id=${cat.id})}" th:text="${cat.name}">分类名</a>
                            </li>
                            <li th:if="${#lists.isEmpty(categories)}"><span class="dropdown-item text-muted">暂无分类</span></li>
                        </ul>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin}">管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="principal.username">用户名</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">退出</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/login}">登录</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/register}">注册</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Banner -->
    <div class="hero-section">
        <div class="container">
            <h1>MyBlog</h1>
            <p th:text="${blogDescription} ?: '分享技术，记录生活'">分享技术，记录生活</p>
        </div>
    </div>

    <main class="container mt-4 mb-5">
        <div class="row">
            <!-- Left: Article List -->
            <div class="col-lg-8">
                <!-- Article Cards -->
                <div th:each="article : ${articles.records}" class="article-card">
                    <h2 class="article-title">
                        <a th:href="@{/article/{id}(id=${article.id})}" th:text="${article.title}">文章标题</a>
                    </h2>
                    <div class="article-summary">
                        <span th:if="${article.summary != null and article.summary != ''}" th:text="${article.summary}">摘要</span>
                        <span th:unless="${article.summary != null and article.summary != ''}"
                              th:text="${#strings.abbreviate(#strings.escapeXml(article.content), 200)}">内容截断</span>
                    </div>
                    <div class="article-meta">
                        <span class="meta-category" th:text="${article.category?.name}">分类</span>
                        <span class="meta-author" th:text="${article.author?.username}">作者</span>
                        <span class="meta-time"
                              th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                        <span class="meta-views" th:text="${article.viewCount}">0 阅读</span>
                    </div>
                    <div class="article-tags" th:if="${article.tags} != null and !${article.tags.isEmpty()}">
                        <span class="tag" th:each="tag : ${article.tags}" th:text="${tag.name}">标签</span>
                    </div>
                </div>

                <!-- No articles message -->
                <div th:if="${articles.records.isEmpty()}" class="text-center py-5 text-muted">
                    <p>暂无文章</p>
                </div>

                <!-- Pagination -->
                <div class="pagination-container" th:if="${articles.totalPages} > 1">
                    <nav>
                        <ul class="pagination">
                            <li class="page-item" th:classappend="${articles.current} <= 1 ? 'disabled'">
                                <a class="page-link" th:href="@{/(page=${articles.current} - 1, keyword=${keyword})}">上一页</a>
                            </li>
                            <li class="page-item" th:each="i : ${#numbers.sequence(1, articles.totalPages)}"
                                th:classappend="${i} == ${articles.current} ? 'active'">
                                <a class="page-link" th:href="@{/(page=${i}, keyword=${keyword})}" th:text="${i}">1</a>
                            </li>
                            <li class="page-item" th:classappend="${articles.current} >= ${articles.totalPages} ? 'disabled'">
                                <a class="page-link" th:href="@{/(page=${articles.current} + 1, keyword=${keyword})}">下一页</a>
                            </li>
                        </ul>
                    </nav>
                </div>
            </div>

            <!-- Right Sidebar -->
            <div class="col-lg-4">
                <div class="sidebar">
                    <!-- Search Box -->
                    <div class="sidebar-section search-box">
                        <h5>搜索文章</h5>
                        <form th:action="@{/}" method="get">
                            <div class="input-group">
                                <input type="text" name="keyword" class="form-control" placeholder="输入关键词..."
                                       th:value="${keyword}" />
                                <button class="btn btn-primary" type="submit">搜索</button>
                            </div>
                        </form>
                    </div>

                    <!-- Category List -->
                    <div class="sidebar-section" th:if="${categories} != null and !${categories.isEmpty()}">
                        <h5>文章分类</h5>
                        <ul>
                            <li th:each="cat : ${categories}">
                                <a th:href="@{/category/{id}(id=${cat.id})}" th:text="${cat.name}">分类名</a>
                            </li>
                        </ul>
                    </div>

                    <!-- Recent Articles -->
                    <div class="sidebar-section" th:if="${recentArticles} != null and !${recentArticles.isEmpty()}">
                        <h5>最新文章</h5>
                        <ul>
                            <li th:each="ra : ${recentArticles}">
                                <a th:href="@{/article/{id}(id=${ra.id})}" th:text="${ra.title}">文章标题</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
