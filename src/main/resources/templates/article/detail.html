<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article.title} + ' - MyBlog'">文章详情 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">MyBlog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">分类</a>
                        <ul class="dropdown-menu">
                            <li th:each="cat : ${categories}">
                                <a class="dropdown-item" th:href="@{/category/{id}(id=${cat.id})}" th:text="${cat.name}">分类名</a>
                            </li>
                            <li th:if="${#lists.isEmpty(categories)}"><span class="dropdown-item text-muted">暂无分类</span></li>
                        </ul>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin}">管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="principal.username">用户名</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">退出</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/login}">登录</a>
                    </li>
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/register}">注册</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <div class="article-detail">
            <!-- Article Header -->
            <div class="article-header">
                <h1 class="article-title" th:text="${article.title}">文章标题</h1>
                <div class="article-meta">
                    <span class="meta-author" th:text="${article.author?.username}">作者</span>
                    <span class="meta-category">
                        <a th:href="@{/category/{id}(id=${article.categoryId})}" th:text="${article.category?.name}">分类</a>
                    </span>
                    <span class="meta-time"
                          th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">发布时间</span>
                    <span class="meta-views" th:text="${article.viewCount} + ' 次阅读'">0 次阅读</span>
                </div>
            </div>

            <!-- Cover Image -->
            <div class="article-cover" th:if="${article.coverImage} != null and ${article.coverImage} != ''">
                <img th:src="${article.coverImage}" alt="Cover Image" />
            </div>

            <!-- Article Content -->
            <div class="article-content" th:utext="${article.content}">
                文章内容
            </div>

            <!-- Tags -->
            <div class="article-tags" th:if="${article.tags} != null and !${article.tags.isEmpty()}">
                <span class="tag" th:each="tag : ${article.tags}" th:text="${tag.name}">标签</span>
            </div>
        </div>

        <!-- Comments Section -->
        <div class="comments-section mt-5">
            <h3>评论 (<span th:text="${#lists.size(comments)}">0</span>)</h3>

            <!-- Comment Form (if logged in) -->
            <div class="comment-form" sec:authorize="isAuthenticated()">
                <form th:action="@{/article/{id}/comment(id=${article.id})}" method="post">
                    <div class="mb-3">
                        <textarea name="content" class="form-control" rows="3" placeholder="写下你的评论..."
                                  required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">发表评论</button>
                </form>
            </div>
            <div class="comment-form" sec:authorize="!isAuthenticated()">
                <div class="alert alert-light text-center">
                    请先 <a th:href="@{/login}">登录</a> 后再发表评论
                </div>
            </div>

            <!-- Comments List -->
            <div th:if="${comments} != null and !${comments.isEmpty()}">
                <div th:each="comment : ${comments}" class="comment-item">
                    <div class="comment-header">
                        <span class="comment-author" th:text="${comment.user?.username}">评论者</span>
                        <span class="comment-time"
                              th:text="${#temporals.format(comment.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                    </div>
                    <div class="comment-content" th:text="${comment.content}">评论内容</div>

                    <!-- Reply Button (if logged in) -->
                    <button class="comment-reply-btn" sec:authorize="isAuthenticated()"
                            th:attr="onclick=|document.getElementById('reply-form-${comment.id}').classList.toggle('active')|">
                        回复
                    </button>

                    <!-- Reply Form -->
                    <div class="comment-reply-form" th:id="'reply-form-' + ${comment.id}">
                        <form th:action="@{/article/{id}/comment(id=${article.id})}" method="post">
                            <input type="hidden" name="parentId" th:value="${comment.id}" />
                            <div class="mb-2">
                                <textarea name="content" class="form-control" rows="2"
                                          th:placeholder="'回复 @' + ${comment.user?.username}" required></textarea>
                            </div>
                            <button type="submit" class="btn btn-sm btn-outline-primary">提交回复</button>
                        </form>
                    </div>

                    <!-- Nested Replies -->
                    <div class="comment-replies" th:if="${comment.replies} != null and !${comment.replies.isEmpty()}">
                        <div th:each="reply : ${comment.replies}" class="comment-item">
                            <div class="comment-header">
                                <span class="comment-author" th:text="${reply.user?.username}">回复者</span>
                                <span class="comment-time"
                                      th:text="${#temporals.format(reply.createTime, 'yyyy-MM-dd HH:mm')}">时间</span>
                            </div>
                            <div class="comment-content" th:text="${reply.content}">回复内容</div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(comments)}" class="text-center text-muted py-4">
                <p>暂无评论，来说两句吧</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
