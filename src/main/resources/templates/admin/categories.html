<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类管理 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">MyBlog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin}">管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="principal.username">用户名</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">退出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <h2 class="mb-4">分类管理</h2>

        <!-- Add Category Form -->
        <div class="form-container mb-4">
            <h5 class="mb-3">添加新分类</h5>
            <form th:action="@{/admin/category}" method="post">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label for="name" class="form-label">分类名称</label>
                        <input type="text" name="name" id="name" class="form-control"
                               placeholder="请输入分类名称" required />
                    </div>
                    <div class="col-md-5">
                        <label for="description" class="form-label">分类描述</label>
                        <input type="text" name="description" id="description" class="form-control"
                               placeholder="请输入分类描述（可选）" />
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-primary w-100">添加分类</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Categories Table -->
        <div class="admin-table">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>分类名称</th>
                        <th>描述</th>
                        <th>排序</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.id}">1</td>
                        <td th:text="${cat.name}">分类名</td>
                        <td th:text="${cat.description}">描述</td>
                        <td th:text="${cat.sortOrder}">0</td>
                        <td>
                            <a th:href="@{/admin/category/delete/{id}(id=${cat.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('确定要删除分类「' + this.getAttribute('data-name') + '」吗？')"
                               th:attr="data-name=${cat.name}">删除</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="5" class="text-center text-muted">暂无分类</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
