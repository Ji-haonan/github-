<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">MyBlog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin}">管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="principal.username">用户名</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">退出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <h2 class="mb-4">评论管理</h2>

        <div class="admin-table">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>评论内容</th>
                        <th>所属文章</th>
                        <th>评论者</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="comment : ${comments.records}">
                        <td th:text="${comment.id}">1</td>
                        <td>
                            <span th:text="${#strings.abbreviate(comment.content, 50)}">评论内容截断</span>
                        </td>
                        <td>
                            <a th:href="@{/article/{id}(id=${comment.article?.id})}"
                               th:text="${comment.article?.title}" target="_blank">文章标题</a>
                        </td>
                        <td th:text="${comment.user?.username}">评论者</td>
                        <td th:text="${#temporals.format(comment.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td>
                            <a th:href="@{/admin/comment/delete/{id}(id=${comment.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('确定要删除这条评论吗？')">删除</a>
                        </td>
                    </tr>
                    <tr th:if="${comments.records.isEmpty()}">
                        <td colspan="6" class="text-center text-muted">暂无评论</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container" th:if="${comments.totalPages} > 1">
            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${comments.current} <= 1 ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/comments(page=${comments.current} - 1)}">上一页</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, comments.totalPages)}"
                        th:classappend="${i} == ${comments.current} ? 'active'">
                        <a class="page-link" th:href="@{/admin/comments(page=${i})}" th:text="${i}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${comments.current} >= ${comments.totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/comments(page=${comments.current} + 1)}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">&copy; <span th:text="${#dates.year(#dates.createNow())}">2026</span> MyBlog. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
