<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${article} != null ? '编辑文章' : '写文章'">写文章 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">MyBlog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin}">管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="principal.username">用户名</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">退出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <div class="form-container" style="max-width: 900px; margin: 0 auto;">
            <h2 class="mb-4" th:text="${article} != null ? '编辑文章' : '写文章'">写文章</h2>

            <form th:action="${article} != null ? @{/admin/article/update} : @{/admin/article}"
                  method="post">
                <!-- Hidden ID field for edit mode -->
                <input type="hidden" name="id" th:value="${article?.id}" th:if="${article} != null" />

                <!-- Title -->
                <div class="mb-3">
                    <label for="title" class="form-label">标题</label>
                    <input type="text" name="title" id="title" class="form-control"
                           placeholder="请输入文章标题" th:value="${article?.title}" required />
                </div>

                <!-- Summary -->
                <div class="mb-3">
                    <label for="summary" class="form-label">摘要</label>
                    <textarea name="summary" id="summary" class="form-control" rows="3"
                              placeholder="请输入文章摘要（可选）" th:text="${article?.summary}"></textarea>
                </div>

                <!-- Content -->
                <div class="mb-3">
                    <label for="content" class="form-label">内容（支持 HTML）</label>
                    <textarea name="content" id="content" class="form-control" rows="15"
                              placeholder="请输入文章内容" required th:text="${article?.content}"></textarea>
                </div>

                <!-- Category -->
                <div class="mb-3">
                    <label for="categoryId" class="form-label">分类</label>
                    <select name="categoryId" id="categoryId" class="form-select">
                        <option value="">请选择分类</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${article?.category?.id} == ${cat.id}">
                            分类名
                        </option>
                    </select>
                </div>

                <!-- Cover Image -->
                <div class="mb-3">
                    <label for="coverImage" class="form-label">封面图片 URL</label>
                    <input type="text" name="coverImage" id="coverImage" class="form-control"
                           placeholder="请输入封面图片链接（可选）" th:value="${article?.coverImage}" />
                </div>

                <!-- Status -->
                <div class="mb-3">
                    <label class="form-label">状态</label>
                    <div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" id="statusDraft"
                                   value="DRAFT"
                                   th:checked="${article} == null or ${article.status?.name() == 'DRAFT'}" />
                            <label class="form-check-label" for="statusDraft">草稿</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="status" id="statusPublished"
                                   value="PUBLISHED"
                                   th:checked="${article?.status?.name() == 'PUBLISHED'}" />
                            <label class="form-check-label" for="statusPublished">发布</label>
                        </div>
                    </div>
                </div>

                <!-- Tags -->
                <div class="mb-3">
                    <label for="tags" class="form-label">标签</label>
                    <input type="text" name="tags" id="tags" class="form-control"
                           placeholder="多个标签用逗号分隔，如：Java, Spring, 教程"
                           th:value="${article} != null ? ${#strings.listJoin(article.tags.![name], ', ')} : ''" />
                </div>

                <!-- Buttons -->
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${article} != null ? '更新文章' : '发布文章'">发布文章</span>
                    </button>
                    <a th:href="@{/admin/articles}" class="btn btn-outline-secondary">取消</a>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">© <span th:text="${#dates.year(#dates.createNow())}">2026</span> MyBlog · Powered by Spring Boot.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
