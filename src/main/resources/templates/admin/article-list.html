<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - MyBlog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">MyBlog</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin}">管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <span class="navbar-text text-white me-3">
                            <span sec:authentication="principal.username">用户名</span>
                        </span>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/logout}">退出</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mb-5">
        <div class="section-header">
            <h2>文章管理</h2>
            <a th:href="@{/admin/article/new}" class="btn btn-primary">写文章</a>
        </div>

        <div class="admin-table">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>标题</th>
                        <th>分类</th>
                        <th>状态</th>
                        <th>浏览量</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="article : ${articles.records}">
                        <td th:text="${article.id}">1</td>
                        <td>
                            <a th:href="@{/article/{id}(id=${article.id})}" th:text="${article.title}" target="_blank">标题</a>
                        </td>
                        <td th:text="${article.category?.name}">分类</td>
                        <td>
                            <span th:if="${article.status == 'PUBLISHED'}" class="badge-published">已发布</span>
                            <span th:if="${article.status == 'DRAFT'}" class="badge-draft">草稿</span>
                            <span th:unless="${article.status == 'PUBLISHED' or article.status == 'DRAFT'}"
                                  th:text="${article.status}">状态</span>
                        </td>
                        <td th:text="${article.viewCount}">0</td>
                        <td th:text="${#temporals.format(article.createTime, 'yyyy-MM-dd HH:mm')}">时间</td>
                        <td>
                            <a th:href="@{/admin/article/edit/{id}(id=${article.id})}" class="btn btn-sm btn-outline-primary">编辑</a>
                            <a th:href="@{/admin/article/delete/{id}(id=${article.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('确定要删除这篇文章吗？')">删除</a>
                        </td>
                    </tr>
                    <tr th:if="${articles.records.isEmpty()}">
                        <td colspan="7" class="text-center text-muted">暂无文章</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="pagination-container" th:if="${articles.totalPages} > 1">
            <nav>
                <ul class="pagination">
                    <li class="page-item" th:classappend="${articles.current} <= 1 ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/articles(page=${articles.current} - 1)}">上一页</a>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(1, articles.totalPages)}"
                        th:classappend="${i} == ${articles.current} ? 'active'">
                        <a class="page-link" th:href="@{/admin/articles(page=${i})}" th:text="${i}">1</a>
                    </li>
                    <li class="page-item" th:classappend="${articles.current} >= ${articles.totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/articles(page=${articles.current} + 1)}">下一页</a>
                    </li>
                </ul>
            </nav>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container text-center">
            <p class="mb-0">© <span th:text="${#dates.year(#dates.createNow())}">2026</span> MyBlog · Powered by Spring Boot.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
